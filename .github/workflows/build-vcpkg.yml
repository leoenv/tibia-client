name: Build with vcpkg

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - v*
    tags:
      - v*
    paths:
      - .github/workflows/**
      - cmake/**
      - src/**
      - CMakeLists.txt

  pull_request:
    paths:
      - cmake/**
      - src/**
      - CMakeLists.txt

jobs:
  job:
    name: ${{ matrix.os }}-${{ matrix.cxx }}-${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        name: [windows-msvc]
        buildtype: [Release]
        include:
          - name: windows-msvc
            os: windows
            cxx: cl.exe
            cc: cl.exe
            triplet: x64-windows
            packages: >
              boost-iostreams boost-asio boost-system boost-variant boost-lockfree boost-filesystem boost-uuid
              glew luajit libogg libvorbis openal-soft opengl openssl physfs zlib

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Unshallow
        run: git fetch --prune --unshallow || true

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      - name: vcpkg install deps (runner pre-installed vcpkg, sem cache do GitHub)
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --triplet ${{ matrix.triplet }} ${{ matrix.packages }}

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: CMake configure & build (Ninja + MSVC)
        shell: pwsh
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} -DLUAJIT=ON
          cmake --build build --parallel

      - name: dir
        run: Get-ChildItem -Recurse build | Select-Object FullName
        shell: pwsh

      - name: Upload artifact binary (windows exe + dlls)
        uses: actions/upload-artifact@v4
        with:
          name: otclient-windows-Release-${{ github.sha }}
          path: |
            build/otclient.exe
            build/*.dll
        if: contains( matrix.os, 'windows')
